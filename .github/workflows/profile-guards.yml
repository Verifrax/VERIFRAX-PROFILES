name: profile-guards

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate profiles
        shell: bash
        run: |
          set -euo pipefail
          node .verifrax/validate-profiles.js
